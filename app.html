<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>MirBeton ERP | Industrial Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0d0a;
            --card: #121511;
            --border: #242a20;
            --lime: #9dc45a;
            --purple: #9b78f0;
        }
        body { 
            background: var(--bg); 
            color: #e2ead6; 
            font-family: 'JetBrains Mono', monospace; 
            -webkit-tap-highlight-color: transparent;
        }
        h1, h2, h3, .syne { font-family: 'Syne', sans-serif; }
        
        .industrial-card { 
            background: var(--card); 
            border: 1px solid var(--border); 
            border-radius: 20px; 
            position: relative;
            overflow: hidden;
        }
        .industrial-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--lime);
        }
        .admin-border::before { background: var(--purple); }

        .btn-prime { 
            background: var(--lime); color: #000; font-weight: 800; 
            border-radius: 14px; transition: 0.2s; text-transform: uppercase;
        }
        .btn-prime:active { transform: scale(0.96); opacity: 0.9; }
        
        .input-field {
            background: rgba(0,0,0,0.3); border: 1px solid var(--border);
            padding: 12px; border-radius: 12px; width: 100%; outline: none;
        }
        .input-field:focus { border-color: var(--lime); }

        .neon-text { text-shadow: 0 0 10px rgba(157, 196, 90, 0.4); }
        .tab-btn.active { color: var(--lime); border-bottom: 2px solid var(--lime); }
    </style>
</head>
<body class="p-4 pb-24">

    <header class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-2xl font-black italic text-lime-500 tracking-tighter uppercase">MirBeton</h1>
            <div id="role-badge" class="text-[9px] bg-lime-500/10 text-lime-500 px-2 py-0.5 rounded border border-lime-500/20 uppercase font-bold tracking-widest">Loading...</div>
        </div>
        <div id="gps-status" class="text-[9px] text-slate-600 font-bold">● GPS INACTIVE</div>
    </header>

    <div id="app-content">
        <div id="view-admin" class="hidden space-y-4">
            <div class="flex justify-between items-end mb-2">
                <h2 class="text-xl font-black uppercase italic">Foydalanuvchilar</h2>
                <button onclick="loadAdminUsers()" class="text-lime-500 text-xs font-bold">YANGILASH 🔄</button>
            </div>
            <input type="text" id="user-search" oninput="filterUsers()" placeholder="Qidiruv (ism yoki tel)..." class="input-field mb-4">
            <div id="admin-user-list" class="space-y-2"></div>
        </div>

        <div id="view-sales" class="hidden space-y-6">
            <h2 class="text-xl font-black uppercase italic">Yangi Buyurtma</h2>
            <div class="industrial-card p-5 space-y-4">
                <div>
                    <label class="text-[10px] text-slate-500 uppercase font-bold mb-1 block">Mijozni tanlang</label>
                    <select id="s-client-id" class="input-field text-sm"></select>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[10px] text-slate-500 uppercase font-bold mb-1 block">Beton Markasi</label>
                        <select id="s-grade" onchange="calculateSalesTotal()" class="input-field text-sm">
                            <option value="M200" data-price="550000">M200</option>
                            <option value="M300" data-price="650000" selected>M300</option>
                            <option value="M400" data-price="750000">M400</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] text-slate-500 uppercase font-bold mb-1 block">Hajm (m³)</label>
                        <input id="s-volume" type="number" value="10" oninput="calculateSalesTotal()" class="input-field font-bold">
                    </div>
                </div>
                <div>
                    <label class="text-[10px] text-slate-500 uppercase font-bold mb-1 block">1 m³ narxi (so'm)</label>
                    <input id="s-price-m3" type="number" value="650000" oninput="calculateSalesTotal()" class="input-field text-lime-500 font-bold">
                </div>
                <div>
                    <label class="text-[10px] text-slate-500 uppercase font-bold mb-1 block">Manzil</label>
                    <textarea id="s-address" class="input-field text-xs" rows="2" placeholder="To'liq manzil..."></textarea>
                    <button onclick="getAutoLocation()" class="text-[9px] text-lime-500 font-bold mt-2 uppercase tracking-tighter">📍 Hozirgi joylashuvni olish</button>
                </div>
                <div class="bg-black/40 p-4 rounded-xl border border-white/5 flex justify-between items-center">
                    <span class="text-[10px] font-bold uppercase">Jami:</span>
                    <span id="s-total-display" class="text-xl font-black text-lime-500">0 UZS</span>
                </div>
                <button onclick="submitOrder()" class="w-full btn-prime py-4">🚀 Buyurtmani tasdiqlash</button>
            </div>
        </div>

        <div id="view-prod_ops" class="hidden space-y-4">
            <h2 class="text-xl font-black uppercase italic">Navbatdagi Reyslar</h2>
            <div id="prod-trip-list" class="space-y-3">
                </div>
        </div>

        <div id="view-driver" class="hidden space-y-4">
            <div id="active-trip-card">
                </div>
            <div class="grid grid-cols-1 gap-3 mt-6">
                <button onclick="updateTripStatus('en_route')" class="btn-prime py-5 bg-lime-500">🚚 JO'NADIM</button>
                <button onclick="updateTripStatus('arrived')" class="btn-prime py-5 bg-orange-500">📍 MANZILDA</button>
                <button onclick="updateTripStatus('pouring')" class="btn-prime py-5 bg-blue-500">🏗 QUYISH BOSHLANDI</button>
                <button onclick="updateTripStatus('completed')" class="btn-prime py-5 bg-white text-black">🏁 REYS YAKUNLANDI</button>
            </div>
        </div>

        <div id="view-prices" class="hidden space-y-4">
            <h2 class="text-xl font-black uppercase italic">Narxlar Jadvali</h2>
            <div class="industrial-card p-0">
                <table class="w-full text-left">
                    <thead class="bg-white/5 text-[10px] uppercase font-bold text-slate-500">
                        <tr><th class="p-4">Marka</th><th class="p-4 text-right">Narx</th></tr>
                    </thead>
                    <tbody id="prices-body" class="divide-y divide-white/5"></tbody>
                </table>
            </div>
        </div>

        <div id="view-client" class="hidden space-y-4">
            <h2 class="text-xl font-black uppercase italic">Buyurtmalarim</h2>
            <div id="client-order-list" class="space-y-3"></div>
        </div>
    </div>

    <div id="modal-edit-user" class="fixed inset-0 bg-black/90 backdrop-blur-sm hidden z-50 flex items-center justify-center p-6">
        <div class="industrial-card admin-border w-full p-6 space-y-4">
            <h3 class="syne text-lg font-black uppercase italic">Tahrirlash</h3>
            <input type="hidden" id="edit-id">
            <input id="edit-name" type="text" placeholder="F.I.SH" class="input-field">
            <input id="edit-phone" type="text" placeholder="Asosiy tel" class="input-field">
            <select id="edit-role" class="input-field">
                <option value="client">Client (Mijoz)</option>
                <option value="driver">Driver (Haydovchi)</option>
                <option value="sales">Sales (Sotuv)</option>
                <option value="prod_ops">Prod Ops (Operator)</option>
                <option value="admin">Admin</option>
            </select>
            <div class="flex gap-2">
                <button onclick="closeModal()" class="flex-1 bg-slate-800 p-3 rounded-xl font-bold text-xs uppercase">Bekor qilish</button>
                <button onclick="saveUserChanges()" class="flex-1 btn-prime p-3 text-xs">Saqlash</button>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const params = new URLSearchParams(window.location.search);
        const role = params.get('role') || 'prices';
        const userId = params.get('user_id');
        let allUsers = [];
        let currentCoords = { lat: null, lng: null };

        tg.expand();
        tg.enableClosingConfirmation();

        // ════════════════ INITIALIZATION ════════════════
        window.onload = () => {
            document.getElementById('role-badge').innerText = role + " MODE";
            showView(role);
            if(role === 'admin') loadAdminUsers();
            if(role === 'sales') { loadSalesData(); calculateSalesTotal(); }
            if(role === 'prices' || role === 'client') loadPrices();
            if(role === 'prod_ops') loadProdQueue();
            if(role === 'driver') loadDriverJob();
            startGpsTracking();
        };

        function showView(v) {
            document.querySelectorAll('#app-content > div').forEach(d => d.classList.add('hidden'));
            document.getElementById('view-' + v)?.classList.remove('hidden');
        }

        // ════════════════ ADMIN LOGIC ════════════════
        async function loadAdminUsers() {
            const res = await fetch(`/api/admin/users?user_id=${userId}`);
            allUsers = await res.json();
            renderAdminUsers(allUsers);
        }

        function renderAdminUsers(users) {
            const list = document.getElementById('admin-user-list');
            list.innerHTML = users.map(u => `
                <div class="industrial-card admin-border p-4 flex justify-between items-center">
                    <div>
                        <div class="text-sm font-bold uppercase">${u.full_name || 'Noma\'lum'}</div>
                        <div class="text-[10px] text-slate-500">${u.phone} | <span class="text-lime-500 font-bold uppercase">${u.role}</span></div>
                    </div>
                    <button onclick="openEditModal('${u.id}')" class="bg-slate-800 px-3 py-1.5 rounded-lg text-[10px] font-bold">EDIT</button>
                </div>
            `).join('');
        }

        function openEditModal(id) {
            const u = allUsers.find(x => x.id === id);
            document.getElementById('edit-id').value = u.id;
            document.getElementById('edit-name').value = u.full_name;
            document.getElementById('edit-phone').value = u.phone;
            document.getElementById('edit-role').value = u.role;
            document.getElementById('modal-edit-user').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('modal-edit-user').classList.add('hidden'); }

        async function saveUserChanges() {
            const data = {
                admin_id: userId,
                target_id: document.getElementById('edit-id').value,
                full_name: document.getElementById('edit-name').value,
                phone: document.getElementById('edit-phone').value,
                role: document.getElementById('edit-role').value
            };
            await fetch('/api/admin/update-user', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            closeModal();
            loadAdminUsers();
            tg.HapticFeedback.notificationOccurred('success');
        }

        // ════════════════ SALES LOGIC ════════════════
        async function loadSalesData() {
            const res = await fetch('/api/sales/clients');
            const clients = await res.json();
            document.getElementById('s-client-id').innerHTML = clients.map(c => `
                <option value="${c.id}">${c.full_name} (${c.phone})</option>
            `).join('');
        }

        function calculateSalesTotal() {
            const vol = parseFloat(document.getElementById('s-volume').value) || 0;
            const price = parseInt(document.getElementById('s-price-m3').value) || 0;
            document.getElementById('s-total-display').innerText = (vol * price).toLocaleString() + " UZS";
        }

        async function submitOrder() {
            const data = {
                client_id: document.getElementById('s-client-id').value,
                grade: document.getElementById('s-grade').value,
                volume: document.getElementById('s-volume').value,
                price_per_m3: document.getElementById('s-price-m3').value,
                address: document.getElementById('s-address').value
            };
            if(!data.address) return tg.showAlert("Manzil kiritilmagan!");
            
            const res = await fetch('/api/sales/create-order', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            const result = await res.json();
            if(result.success) {
                tg.showConfirm("Buyurtma yaratildi: " + result.order_id);
                location.reload();
            }
        }

        // ════════════════ DRIVER & GPS LOGIC ════════════════
        function startGpsTracking() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(pos => {
                    currentCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    document.getElementById('gps-status').innerText = "● GPS ACTIVE";
                    document.getElementById('gps-status').classList.replace('text-slate-600', 'text-lime-500');
                });
            }
        }

        async function updateTripStatus(event) {
            tg.HapticFeedback.impactOccurred('medium');
            const tripId = 1; // Real trip ID bo'lishi kerak
            await fetch('/api/driver/event', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ trip_id: tripId, event: event, ...currentCoords })
            });
            tg.showAlert("Status yangilandi: " + event.toUpperCase());
            if(event === 'completed') tg.close();
        }

        // ════════════════ PRICES LOGIC ════════════════
        async function loadPrices() {
            const res = await fetch('/api/prices');
            const data = await res.json();
            document.getElementById('prices-body').innerHTML = data.map(p => `
                <tr>
                    <td class="p-4 font-bold uppercase italic text-white">${p.Marka}</td>
                    <td class="p-4 text-right text-lime-500 font-black italic">${parseInt(p.Narx).toLocaleString()} <span class="text-[8px] text-slate-600 uppercase">sum</span></td>
                </tr>
            `).join('');
        }

        // ════════════════ UTILS ════════════════
        async function getAutoLocation() {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`);
                const data = await res.json();
                document.getElementById('s-address').value = data.display_name;
            });
        }
    </script>
</body>
</html>
