<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>MirBeton Mini App</title>
</head>
<body class="bg-slate-50 text-slate-900 overflow-x-hidden">
    <div id="app" class="max-w-md mx-auto p-4 pb-20">
        <!-- Loader -->
        <div id="loader" class="flex flex-col items-center justify-center h-64">
            <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600 mb-2"></div>
            <p class="text-xs text-slate-400">Yuklanmoqda...</p>
        </div>

        <!-- Role: DRIVER (Haydovchi) -->
        <div id="view-driver" class="hidden space-y-4">
            <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 border-l-8 border-blue-500">
                <h2 class="text-[10px] font-bold text-slate-400 uppercase">Joriy Vazifa</h2>
                <div class="text-xl font-black italic">M 350 · 15 m³</div>
                <p class="text-sm text-slate-500">📍 Urgut t., Kamongaron</p>
            </div>
            <div class="grid grid-cols-1 gap-3">
                <button onclick="sendAction('en_route')" class="py-6 bg-blue-600 text-white rounded-2xl font-black text-xl shadow-lg active:scale-95 transition-all">🚚 YO'LGA CHIQDIM</button>
                <button onclick="sendAction('arrived')" class="py-6 bg-orange-500 text-white rounded-2xl font-black text-xl shadow-lg active:scale-95 transition-all">📍 MANZILDA</button>
                <button onclick="sendAction('pouring')" class="py-6 bg-red-600 text-white rounded-2xl font-black text-xl shadow-lg active:scale-95 transition-all">🏗 QUYISHNI BOSHLADIM</button>
                <button onclick="sendAction('done')" class="py-6 bg-black text-white rounded-2xl font-black text-xl shadow-lg active:scale-95 transition-all">🏁 TUGATDIM</button>
            </div>
        </div>

        <!-- Role: CLIENT (Mijoz) -->
        <div id="view-client" class="hidden space-y-4">
            <h1 class="text-2xl font-black mb-4">Mening Buyurtmalarim</h1>
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
                <div class="flex justify-between items-start">
                    <div>
                        <div class="text-lg font-bold">12 m³ · M 300</div>
                        <p class="text-xs text-slate-400">Holat: <span class="text-blue-600 font-bold">Yo'lda</span></p>
                    </div>
                    <span class="text-[10px] font-mono bg-slate-100 p-1 rounded">#MB-4401</span>
                </div>
            </div>
        </div>

        <!-- Role: PROD_OPS (Zavod) -->
        <div id="view-prod_ops" class="hidden space-y-4">
            <h1 class="text-2xl font-black mb-4">Zavod Navbati</h1>
            <div class="bg-white p-8 rounded-3xl border-2 border-dashed border-slate-200 text-center">
                <i class="fas fa-truck-ramp-box text-slate-200 text-5xl mb-3"></i>
                <p class="text-slate-400 text-sm italic">Hozircha yangi buyurtmalar yo'q</p>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const urlParams = new URLSearchParams(window.location.search);
        const role = urlParams.get('role') || 'client';

        window.onload = () => {
            document.getElementById('loader').classList.add('hidden');
            const roleView = document.getElementById('view-' + role);
            if (roleView) roleView.classList.remove('hidden');
            else document.getElementById('view-client').classList.remove('hidden');
        };

        function sendAction(step) {
            tg.HapticFeedback.notificationOccurred('success');
            // Kelajakda bu yerda API chaqiriladi
            tg.showConfirm("Harakat: " + step.toUpperCase() + "\nTasdiqlaysizmi?", (ok) => {
                if(ok) tg.close();
            });
        }
    </script>
</body>
</html>
