<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 p-4">
    <div id="view-driver" class="hidden space-y-4">
        <div class="bg-white p-5 rounded-3xl shadow-sm border-l-8 border-blue-600">
            <div class="text-xs font-bold text-slate-400">FAOL BUYURTMA</div>
            <div id="order-id" class="text-2xl font-black italic italic uppercase tracking-tighter">Yuklanmoqda...</div>
        </div>
        <div class="grid grid-cols-1 gap-3">
            <button onclick="sendEv('en_route')" class="py-6 bg-blue-600 text-white rounded-2xl font-bold text-xl">🚚 JO'NADIM</button>
            <button onclick="sendEv('arrived')" class="py-6 bg-orange-500 text-white rounded-2xl font-bold text-xl">📍 MANZILDA</button>
            <button onclick="sendEv('pouring')" class="py-6 bg-red-600 text-white rounded-2xl font-bold text-xl">🏗 BOSHLADIM</button>
            <button onclick="sendEv('done')" class="py-6 bg-black text-white rounded-2xl font-bold text-xl">🏁 TUGATDIM</button>
        </div>
    </div>

    <div id="view-client" class="hidden space-y-4 text-center py-20">
        <div class="text-6xl mb-4">📦</div>
        <h1 class="text-2xl font-black">Buyurtmalaringiz yo'lda!</h1>
        <p class="text-slate-400">Bot orqali xabarlarni kuzatib boring.</p>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const params = new URLSearchParams(window.location.search);
        const role = params.get('role');
        const userId = params.get('user_id');

        // Test uchun doimiy order_id. Realda buni API orqali olish kerak.
        let currentOrderId = "MB-2603-TEST"; 

        window.onload = () => {
            document.getElementById('view-' + role).classList.remove('hidden');
            document.getElementById('order-id').innerText = currentOrderId;
            tg.expand();
        };

        async function sendEv(step) {
            tg.HapticFeedback.notificationOccurred('success');
            const res = await fetch('/api/driver-event', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ order_id: currentOrderId, step: step, user_id: userId })
            });
            if(res.ok) tg.showScanQrPopup({ text: "Muvaffaqiyatli: " + step.toUpperCase() });
            setTimeout(() => tg.closeScanQrPopup(), 1000);
        }
    </script>
</body>
</html>
