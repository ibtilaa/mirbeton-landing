<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <header>
        <h1 class="syne text-purple-500 italic uppercase">ADMIN PANEL</h1>
        <span class="badge" style="color:var(--purple); border-color:var(--purple)">Admin</span>
    </header>
    <div id="stats" class="grid grid-cols-2 gap-2 mb-4">
        <div class="industrial-card admin-card p-3 text-center">
            <div class="text-xs uppercase">Bugun</div>
            <div class="text-xl font-bold" id="stat-volume">— m³</div>
        </div>
        <div class="industrial-card admin-card p-3 text-center">
            <div class="text-xs uppercase">Buyurtmalar</div>
            <div class="text-xl font-bold" id="stat-orders">—</div>
        </div>
    </div>
    <h2 class="syne text-xs uppercase mb-3">Foydalanuvchilar</h2>
    <div id="user-management">Yuklanmoqda…</div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const userId = params.get('user_id');
        if (window.Telegram && window.Telegram.WebApp) window.Telegram.WebApp.expand();

        async function load() {
            if (!userId) { document.getElementById('user-management').innerHTML = '<p class="text-slate-500">user_id kerak (bot orqali kiring).</p>'; return; }
            try {
                const r = await fetch('/api/admin/users?user_id=' + encodeURIComponent(userId));
                const data = await r.json();
                if (data.error) { document.getElementById('user-management').innerHTML = '<p class="text-slate-500">' + data.error + '</p>'; return; }
                const list = Array.isArray(data) ? data : [];
                document.getElementById('user-management').innerHTML = list.length === 0
                    ? '<p class="text-slate-500">Foydalanuvchi yo\'q.</p>'
                    : list.map(u => '<div class="industrial-card admin-card p-4 mb-3"><div class="font-bold">' + (u.full_name || '—') + '</div><div class="text-xs text-slate-500">' + (u.phone || '') + ' · ' + (u.role || '') + '</div></div>').join('');
            } catch (e) {
                document.getElementById('user-management').innerHTML = '<p class="text-slate-500">Xato: ro\'yxat yuklanmadi.</p>';
            }
        }
        load();
    </script>
</body>
</html>
